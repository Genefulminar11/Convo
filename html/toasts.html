<!-- DM Notification Toast -->
<div class="dm-toast hidden" id="dmToast">
  <div class="dm-toast-avatar" id="dmToastAvatar"></div>
  <div class="dm-toast-info">
    <span class="dm-toast-name" id="dmToastName"></span>
    <span class="dm-toast-msg" id="dmToastMsg"></span>
  </div>
</div>

<!-- Channel Request Toast -->
<div class="channel-request-toast hidden" id="channelRequestToast">
  <div class="channel-request-toast-icon"><i class="fas fa-clock"></i></div>
  <div class="channel-request-toast-info">
    <span class="channel-request-toast-title" id="channelRequestToastTitle">Request Submitted</span>
    <span class="channel-request-toast-msg" id="channelRequestToastMsg">Waiting for approval</span>
  </div>
</div>
