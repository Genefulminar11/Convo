<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convo – Messaging App</title>
  <meta name="description" content="Convo – A real-time messaging app by Gene Ryan.">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Apply saved theme immediately -->
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>

  <!-- App Layout -->
  <div class="app-container">
    <div id="partial-sidebar"><!-- html/sidebar.html --></div>
    <div id="partial-chat"><!-- html/chat.html --></div>
  </div>

  <!-- Modals & Overlays -->
  <div id="partial-auth"><!-- html/auth-modal.html --></div>
  <div id="partial-modals"><!-- html/modals.html --></div>
  <div id="partial-channels"><!-- html/channels.html --></div>

  <!-- Toasts -->
  <div id="partial-toasts"><!-- html/toasts.html --></div>

  <!-- CDN Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Loader: fetches HTML partials then loads app scripts -->
  <script src="js/loader.js"></script>
</body>
</html>
